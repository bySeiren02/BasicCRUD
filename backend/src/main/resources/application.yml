server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:basiccrud}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

# JWT 설정 (로컬 실행 시 기본값, Docker에서는 환경변수로 오버라이드)
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-change-in-production}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    com.basiccrud: INFO
    org.springframework.security: INFO
